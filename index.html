<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shoutbox - Czat</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .app {
        width: 420px;
        background: #111827;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .header {
        padding: 15px;
        background: #1f2937;
        text-align: center;
        font-weight: bold;
    }

    #ekran-logowania, #ekran-czatu {
        padding: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        outline: none;
        margin-bottom: 10px;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #2563eb;
        color: white;
        font-weight: bold;
    }

    button:hover {
        background: #1d4ed8;
    }

    .chat-window {
        height: 350px;
        overflow-y: auto;
        background: #0b1220;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    .msg {
        padding: 6px 10px;
        margin: 5px 0;
        background: #1f2937;
        border-radius: 8px;
    }

    .msg-author {
        font-weight: bold;
        color: #60a5fa;
        margin-right: 5px;
    }

    form {
        display: flex;
        gap: 5px;
    }

    form input {
        flex: 1;
        margin: 0;
    }

    form button {
        width: 120px;
    }
</style>
</head>

<body>

<div class="app">

    <div class="header">💬 Klasowy Shoutbox</div>

    <!-- LOGIN -->
    <div id="ekran-logowania">
        <input type="text" id="input-nick" placeholder="Wpisz nick..." />
        <button id="btn-wejdz">Wejdź na czat</button>
    </div>

    <!-- CHAT -->
    <div id="ekran-czatu" style="display:none;">

        <p>Jesteś zalogowany jako: <b id="moj-nick-wyswietlacz"></b></p>

        <div class="chat-window" id="okno-czatu">
            <!-- wiadomości -->
        </div>

        <form id="formularz-wiadomosci">
            <input type="text" id="input-wiadomosc" placeholder="Napisz wiadomość..." />
            <button type="submit">Wyślij</button>
        </form>

        <button id="btn-wyloguj" style="margin-top:10px;background:#dc3545;">
            Wyloguj
        </button>

    </div>

</div>

<script src="/chat/js/app.js"></script>

</body>
</html>
